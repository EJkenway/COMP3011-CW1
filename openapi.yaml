openapi: 3.0.3
info:
  title: Smart Productivity Analytics Platform API
  version: 1.0.0
  description: "\n## Overview\n\nA comprehensive RESTful API for intelligent task
    management, habit tracking, \nand productivity analytics. Built with Django REST
    Framework.\n\n## Features\n\n- **Task Management**: Full CRUD operations with
    categories, tags, and priorities\n- **Habit Tracking**: Daily/weekly habits with
    streak tracking\n- **Pomodoro Timer**: Focus session management and tracking\n-
    **Productivity Analytics**: Daily snapshots, trends, and insights\n- **Weather
    Integration**: Correlate productivity with weather conditions\n\n## Authentication\n\nThis
    API uses JWT (JSON Web Token) authentication. Include the token in the Authorization
    header:\n\n```\nAuthorization: Bearer <your_access_token>\n```\n\n## Rate Limiting\n\n-
    Anonymous users: 100 requests/hour\n- Authenticated users: 1000 requests/hour\n\n##
    MCP Compatibility\n\nThis API is designed to be Model Context Protocol (MCP) compatible
    for AI agent integration.\n    "
  contact:
    name: API Support
    email: support@productivity-api.example.com
  license:
    name: MIT License
paths:
  /api/v1/analytics/dashboard/:
    get:
      operationId: analytics_dashboard_retrieve
      description: "\nGet comprehensive dashboard statistics including:\n- Today's
        progress\n- Weekly summary\n- Habit status\n- Recent activity\n        "
      summary: Get dashboard analytics
      tags:
      - Analytics
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  today:
                    type: object
                  week:
                    type: object
                  habits:
                    type: object
                  recent_tasks:
                    type: array
          description: ''
  /api/v1/analytics/habits/:
    get:
      operationId: analytics_habits_retrieve
      description: Get detailed habit statistics and performance data.
      summary: Get habit analytics
      parameters:
      - in: query
        name: days
        schema:
          type: integer
          default: 30
        description: Number of days to analyze
      tags:
      - Analytics
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_habits:
                    type: integer
                  active_habits:
                    type: integer
                  total_completions:
                    type: integer
                  avg_completion_rate:
                    type: number
                  longest_streak:
                    type: integer
                  current_longest_streak:
                    type: integer
                  habits_summary:
                    type: array
                  best_performing_habits:
                    type: array
                  needs_attention:
                    type: array
                  completion_heatmap:
                    type: array
          description: ''
  /api/v1/analytics/pomodoro/:
    get:
      operationId: analytics_pomodoro_retrieve
      description: Get detailed focus session statistics.
      summary: Get pomodoro analytics
      parameters:
      - in: query
        name: days
        schema:
          type: integer
          default: 30
        description: Number of days to analyze
      tags:
      - Analytics
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_sessions:
                    type: integer
                  completed_sessions:
                    type: integer
                  total_focus_minutes:
                    type: integer
                  total_break_minutes:
                    type: integer
                  avg_session_duration:
                    type: number
                  avg_interruptions:
                    type: number
                  completion_rate:
                    type: number
                  sessions_by_hour:
                    type: array
                  sessions_by_day:
                    type: array
                  most_focused_tasks:
                    type: array
          description: ''
  /api/v1/analytics/tasks/:
    get:
      operationId: analytics_tasks_retrieve
      description: Get detailed task statistics and distributions.
      summary: Get task analytics
      parameters:
      - in: query
        name: days
        schema:
          type: integer
          default: 30
        description: Number of days to analyze
      tags:
      - Analytics
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_tasks:
                    type: integer
                  completed_tasks:
                    type: integer
                  pending_tasks:
                    type: integer
                  in_progress_tasks:
                    type: integer
                  overdue_tasks:
                    type: integer
                  completion_rate:
                    type: number
                  avg_completion_time_minutes:
                    type: number
                    nullable: true
                  by_priority:
                    type: object
                  by_energy_level:
                    type: object
                  by_category:
                    type: array
                  completion_by_hour:
                    type: array
                  completion_by_day:
                    type: array
          description: ''
  /api/v1/analytics/trends/:
    get:
      operationId: analytics_trends_retrieve
      description: Get historical productivity trends and insights.
      summary: Get productivity trends
      parameters:
      - in: query
        name: period
        schema:
          type: string
          default: month
        description: 'Period to analyze: week, month, quarter'
      tags:
      - Analytics
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: string
                  start_date:
                    type: string
                  end_date:
                    type: string
                  productivity_trend:
                    type: array
                  focus_time_trend:
                    type: array
                  avg_productivity_score:
                    type: number
                  productivity_change:
                    type: number
                  avg_daily_tasks:
                    type: number
                  avg_daily_focus_minutes:
                    type: number
                  insights:
                    type: array
                  recommendations:
                    type: array
          description: ''
  /api/v1/auth/change-password/:
    post:
      operationId: auth_change_password_create
      description: "\nChange the authenticated user's password.\n\nRequires the current
        password for verification.\n        "
      summary: Change password
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  tokens:
                    type: object
                    description: New JWT tokens after password change
                    properties:
                      access:
                        type: string
                      refresh:
                        type: string
          description: ''
  /api/v1/auth/profile/:
    get:
      operationId: auth_profile_retrieve
      description: Retrieve the authenticated user's profile information.
      summary: Get current user profile
      tags:
      - Authentication
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: auth_profile_update
      description: Update the authenticated user's profile information.
      summary: Update user profile
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileUpdate'
          description: ''
    patch:
      operationId: auth_profile_partial_update
      description: Partially update the authenticated user's profile.
      summary: Partially update user profile
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdateRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileUpdate'
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: "\nRegister a new user account.\n\nReturns JWT tokens (access and
        refresh) upon successful registration.\n\n**Password Requirements:**\n- Minimum
        8 characters\n- Cannot be entirely numeric\n- Cannot be too similar to other
        personal information\n- Cannot be a commonly used password\n        "
      summary: Register a new user
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                  tokens:
                    type: object
                    properties:
                      access:
                        type: string
                      refresh:
                        type: string
                  message:
                    type: string
          description: ''
  /api/v1/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/v1/auth/token/blacklist/:
    post:
      operationId: auth_token_blacklist_create
      description: |-
        Takes a token and blacklists it. Must be used with the
        `rest_framework_simplejwt.token_blacklist` app installed.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenBlacklistRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenBlacklistRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenBlacklistRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/categories/:
    get:
      operationId: categories_list
      description: Get all categories for the authenticated user.
      summary: List all categories
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Categories
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCategoryList'
          description: ''
    post:
      operationId: categories_create
      description: Create a new task category.
      summary: Create a category
      tags:
      - Categories
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
  /api/v1/categories/{id}/:
    get:
      operationId: categories_retrieve
      description: Retrieve details of a specific category.
      summary: Get category details
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Category.
        required: true
      tags:
      - Categories
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
    put:
      operationId: categories_update
      description: Update all fields of a category.
      summary: Update a category
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Category.
        required: true
      tags:
      - Categories
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
    patch:
      operationId: categories_partial_update
      description: Update specific fields of a category.
      summary: Partially update a category
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Category.
        required: true
      tags:
      - Categories
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCategoryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCategoryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCategoryRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
    delete:
      operationId: categories_destroy
      description: Delete a category. Tasks in this category will have their category
        set to null.
      summary: Delete a category
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Category.
        required: true
      tags:
      - Categories
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/categories/{id}/stats/:
    get:
      operationId: categories_stats_retrieve
      description: Get task statistics for a specific category.
      summary: Get category statistics
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Category.
        required: true
      tags:
      - Categories
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_tasks:
                    type: integer
                  completed_tasks:
                    type: integer
                  pending_tasks:
                    type: integer
                  overdue_tasks:
                    type: integer
          description: ''
  /api/v1/habits/:
    get:
      operationId: habits_list
      description: Get all habits for the authenticated user.
      summary: List all habits
      parameters:
      - in: query
        name: frequency
        schema:
          type: string
          enum:
          - custom
          - daily
          - weekly
        description: |-
          * `daily` - Daily
          * `weekly` - Weekly
          * `custom` - Custom
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Habits
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedHabitList'
          description: ''
    post:
      operationId: habits_create
      description: Create a new habit to track.
      summary: Create a habit
      tags:
      - Habits
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HabitCreateUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/HabitCreateUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/HabitCreateUpdateRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitCreateUpdate'
          description: ''
  /api/v1/habits/{id}/:
    get:
      operationId: habits_retrieve
      description: Retrieve details of a specific habit.
      summary: Get habit details
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this habit.
        required: true
      tags:
      - Habits
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Habit'
          description: ''
    put:
      operationId: habits_update
      description: Update all fields of a habit.
      summary: Update a habit
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this habit.
        required: true
      tags:
      - Habits
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HabitCreateUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/HabitCreateUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/HabitCreateUpdateRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitCreateUpdate'
          description: ''
    patch:
      operationId: habits_partial_update
      description: Update specific fields of a habit.
      summary: Partially update a habit
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this habit.
        required: true
      tags:
      - Habits
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedHabitCreateUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedHabitCreateUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedHabitCreateUpdateRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitCreateUpdate'
          description: ''
    delete:
      operationId: habits_destroy
      description: Delete a habit and all associated logs.
      summary: Delete a habit
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this habit.
        required: true
      tags:
      - Habits
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/habits/{id}/complete/:
    post:
      operationId: habits_complete_create
      description: Record a completion of this habit. Updates streak automatically.
      summary: Log habit completion
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this habit.
        required: true
      tags:
      - Habits
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HabitCompleteRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/HabitCompleteRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/HabitCompleteRequestRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitCompleteResponse'
          description: ''
  /api/v1/habits/{id}/history/:
    get:
      operationId: habits_history_list
      description: Get completion log history for a habit.
      summary: Get habit completion history
      parameters:
      - in: query
        name: days
        schema:
          type: integer
          default: 30
        description: Number of days to look back
      - in: query
        name: frequency
        schema:
          type: string
          enum:
          - custom
          - daily
          - weekly
        description: |-
          * `daily` - Daily
          * `weekly` - Weekly
          * `custom` - Custom
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this habit.
        required: true
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Habits
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedHabitLogList'
          description: ''
  /api/v1/habits/{id}/reset_streak/:
    post:
      operationId: habits_reset_streak_create
      description: Reset the streak for a habit (admin action).
      summary: Reset habit streak
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this habit.
        required: true
      tags:
      - Habits
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Habit'
          description: ''
  /api/v1/habits/today/:
    get:
      operationId: habits_today_retrieve
      description: Get all active habits that should be completed today.
      summary: Get today's habits
      tags:
      - Habits
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
