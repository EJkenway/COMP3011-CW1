components:
  schemas:
    BulkUpdateStatusRequestRequest:
      type: object
      description: Request body for bulk status update endpoint.
      properties:
        task_ids:
          type: array
          items:
            type: string
            format: uuid
          description: List of task UUIDs to update
        status:
          allOf:
          - $ref: '#/components/schemas/BulkUpdateStatusRequestStatusEnum'
          description: |-
            New status for the tasks

            * `pending` - pending
            * `in_progress` - in_progress
            * `completed` - completed
            * `cancelled` - cancelled
      required:
      - status
      - task_ids
    BulkUpdateStatusRequestStatusEnum:
      enum:
      - pending
      - in_progress
      - completed
      - cancelled
      type: string
      description: |-
        * `pending` - pending
        * `in_progress` - in_progress
        * `completed` - completed
        * `cancelled` - cancelled
    BulkUpdateStatusResponse:
      type: object
      description: Response for bulk status update endpoint.
      properties:
        updated_count:
          type: integer
          description: Number of tasks updated
        message:
          type: string
          description: Success message
      required:
      - message
      - updated_count
    Category:
      type: object
      description: |-
        Serializer for task categories.

        Supports hierarchical categories with parent-child relationships.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
        color:
          type: string
          maxLength: 7
        icon:
          type: string
          maxLength: 50
        parent:
          type: string
          format: uuid
          nullable: true
        is_active:
          type: boolean
        tasks_count:
          type: integer
          description: Get number of tasks in this category.
          readOnly: true
        subcategories:
          type: array
          items: {}
          description: Get child categories (one level deep).
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - subcategories
      - tasks_count
      - updated_at
    CategoryRequest:
      type: object
      description: |-
        Serializer for task categories.

        Supports hierarchical categories with parent-child relationships.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
        color:
          type: string
          minLength: 1
          maxLength: 7
        icon:
          type: string
          minLength: 1
          maxLength: 50
        parent:
          type: string
          format: uuid
          nullable: true
        is_active:
          type: boolean
      required:
      - name
    CategorySimple:
      type: object
      description: Simplified category serializer for nested display.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        color:
          type: string
          maxLength: 7
        icon:
          type: string
          maxLength: 50
      required:
      - id
      - name
    ChangePasswordRequest:
      type: object
      description: |-
        Serializer for password change.

        Validates old password and ensures new passwords match.
      properties:
        old_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password_confirm:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - new_password
      - new_password_confirm
      - old_password
    EnergyLevelEnum:
      enum:
      - high
      - medium
      - low
      type: string
      description: |-
        * `high` - High Energy
        * `medium` - Medium Energy
        * `low` - Low Energy
    MCPExecuteRequestRequest:
      type: object
      description: Request body for MCP tool execution.
      properties:
        tool:
          type: string
          minLength: 1
          description: Name of the tool to execute
        arguments:
          type: object
          additionalProperties: {}
          description: Arguments for the tool
      required:
      - tool
    MCPExecuteResponse:
      type: object
      description: Response for MCP tool execution.
      properties:
        success:
          type: boolean
          description: Whether the execution was successful
        result:
          type: object
          additionalProperties: {}
          nullable: true
          description: Result data from the tool execution
        error:
          type: string
          nullable: true
          description: Error message if execution failed
      required:
      - success
    PaginatedCategoryList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
