openapi: 3.0.3
info:
  title: Smart Productivity Analytics Platform API
  version: 1.0.0
  description: "\n## Overview\n\nA comprehensive RESTful API for intelligent task
    management and productivity analytics. \nBuilt with Django REST Framework.\n\n##
    Features\n\n- **Task Management**: Full CRUD operations with categories, tags,
    and priorities\n- **Productivity Analytics**: Dashboard, trends, and insights\n-
    **MCP Integration**: Model Context Protocol compatible for AI agent integration\n\n##
    Authentication\n\nThis API uses JWT (JSON Web Token) authentication. Include the
    token in the Authorization header:\n\n```\nAuthorization: Bearer <your_access_token>\n```\n\n##
    Rate Limiting\n\n- Anonymous users: 100 requests/hour\n- Authenticated users:
    1000 requests/hour\n\n## MCP Compatibility\n\nThis API is designed to be Model
    Context Protocol (MCP) compatible for AI agent integration.\n    "
  contact:
    name: API Support
    email: support@productivity-api.example.com
  license:
    name: MIT License
paths:
  /api/v1/analytics/dashboard/:
    get:
      operationId: analytics_dashboard_retrieve
      description: "\nGet comprehensive dashboard statistics including:\n- Today's
        progress\n- Weekly summary\n- Recent activity\n        "
      summary: Get dashboard analytics
      tags:
      - Analytics
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  today:
                    type: object
                  week:
                    type: object
                  recent_tasks:
                    type: array
          description: ''
  /api/v1/analytics/tasks/:
    get:
      operationId: analytics_tasks_retrieve
      description: Get detailed task statistics and distributions.
      summary: Get task analytics
      parameters:
      - in: query
        name: days
        schema:
          type: integer
          default: 30
        description: Number of days to analyze
      tags:
      - Analytics
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_tasks:
                    type: integer
                  completed_tasks:
                    type: integer
                  pending_tasks:
                    type: integer
                  in_progress_tasks:
                    type: integer
                  overdue_tasks:
                    type: integer
                  completion_rate:
                    type: number
                  avg_completion_time_minutes:
                    type: number
                    nullable: true
                  by_priority:
                    type: object
                  by_energy_level:
                    type: object
                  by_category:
                    type: array
                  completion_by_hour:
                    type: array
                  completion_by_day:
                    type: array
          description: ''
  /api/v1/analytics/trends/:
    get:
      operationId: analytics_trends_retrieve
      description: Get historical productivity trends and insights.
      summary: Get productivity trends
      parameters:
      - in: query
        name: period
        schema:
          type: string
          default: month
        description: 'Period to analyze: week, month, quarter'
      tags:
      - Analytics
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: string
                  start_date:
                    type: string
                  end_date:
                    type: string
                  productivity_trend:
                    type: array
                  avg_productivity_score:
                    type: number
                  productivity_change:
                    type: number
                  avg_daily_tasks:
                    type: number
                  insights:
                    type: array
                  recommendations:
                    type: array
          description: ''
  /api/v1/auth/change-password/:
    post:
      operationId: auth_change_password_create
      description: "\nChange the authenticated user's password.\n\nRequires the current
        password for verification.\n        "
      summary: Change password
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  tokens:
                    type: object
                    description: New JWT tokens after password change
                    properties:
                      access:
                        type: string
                      refresh:
                        type: string
          description: ''
  /api/v1/auth/profile/:
    get:
      operationId: auth_profile_retrieve
      description: Retrieve the authenticated user's profile information.
      summary: Get current user profile
      tags:
      - Authentication
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: auth_profile_update
      description: Update the authenticated user's profile information.
      summary: Update user profile
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileUpdate'
          description: ''
    patch:
      operationId: auth_profile_partial_update
      description: Partially update the authenticated user's profile.
      summary: Partially update user profile
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdateRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileUpdate'
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: "\nRegister a new user account.\n\nReturns JWT tokens (access and
        refresh) upon successful registration.\n\n**Password Requirements:**\n- Minimum
        8 characters\n- Cannot be entirely numeric\n- Cannot be too similar to other
        personal information\n- Cannot be a commonly used password\n        "
      summary: Register a new user
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                  tokens:
                    type: object
                    properties:
                      access:
                        type: string
                      refresh:
                        type: string
                  message:
                    type: string
          description: ''
  /api/v1/auth/token/:
    post:
      operationId: auth_token_create
      description: Get access and refresh tokens by providing valid credentials.
      summary: Obtain JWT token pair
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/v1/auth/token/blacklist/:
    post:
      operationId: auth_token_blacklist_create
      description: Blacklist a refresh token to invalidate it (logout).
      summary: Blacklist JWT token
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenBlacklistRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenBlacklistRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenBlacklistRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: Get a new access token using a valid refresh token.
      summary: Refresh JWT token
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/categories/:
    get:
      operationId: categories_list
      description: Get all categories for the authenticated user.
      summary: List all categories
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Categories
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCategoryList'
          description: ''
    post:
      operationId: categories_create
      description: Create a new task category.
      summary: Create a category
      tags:
      - Categories
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
  /api/v1/categories/{id}/:
    get:
      operationId: categories_retrieve
      description: Retrieve details of a specific category.
      summary: Get category details
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Category.
        required: true
      tags:
      - Categories
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
    put:
      operationId: categories_update
      description: Update all fields of a category.
      summary: Update a category
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Category.
        required: true
      tags:
      - Categories
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
    patch:
      operationId: categories_partial_update
      description: Update specific fields of a category.
      summary: Partially update a category
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Category.
        required: true
      tags:
      - Categories
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCategoryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCategoryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCategoryRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
    delete:
      operationId: categories_destroy
      description: Delete a category. Tasks in this category will have their category
        set to null.
      summary: Delete a category
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Category.
        required: true
      tags:
      - Categories
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/categories/{id}/stats/:
    get:
      operationId: categories_stats_retrieve
      description: Get task statistics for a specific category.
      summary: Get category statistics
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Category.
        required: true
      tags:
      - Categories
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_tasks:
                    type: integer
                  completed_tasks:
                    type: integer
                  pending_tasks:
                    type: integer
                  overdue_tasks:
                    type: integer
          description: ''
  /api/v1/mcp/capabilities/:
    get:
      operationId: mcp_capabilities_retrieve
      description: "\nReturns the API capabilities in Model Context Protocol (MCP)
        format.\n\nThis endpoint allows AI agents to discover what operations are
        available\nand how to interact with the API programmatically.\n        "
      summary: Get MCP capabilities
      tags:
      - MCP
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  version:
                    type: string
                  description:
                    type: string
                  capabilities:
                    type: object
                  authentication:
                    type: object
          description: ''
  /api/v1/mcp/execute/:
    post:
      operationId: mcp_execute_create
      description: "\nExecute a tool by name with the provided arguments.\n\n**Request
        Format:**\n```json\n{\n    \"tool\": \"tool_name\",\n    \"arguments\": {\n
        \       \"param1\": \"value1\",\n        \"param2\": \"value2\"\n    }\n}\n```\n\n**Response
        Format:**\n```json\n{\n    \"success\": true,\n    \"result\": { ... },\n
        \   \"error\": null\n}\n```\n        "
      summary: Execute an MCP tool
      tags:
      - MCP
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MCPExecuteRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MCPExecuteRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MCPExecuteRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPExecuteResponse'
          description: ''
  /api/v1/mcp/tools/:
    get:
      operationId: mcp_tools_retrieve
      description: "\nReturns all available tools/operations that can be executed
        through the MCP interface.\n\nEach tool includes:\n- Name and description\n-
        Input schema (JSON Schema format)\n- Required authentication level\n        "
      summary: List available MCP tools
      tags:
      - MCP
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  tools:
                    type: array
                    items:
                      type: object
                  count:
                    type: integer
          description: ''
  /api/v1/tags/:
    get:
      operationId: tags_list
      description: Get all tags for the authenticated user.
      summary: List all tags
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Tags
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTagList'
          description: ''
    post:
      operationId: tags_create
      description: Create a new task tag.
      summary: Create a tag
      tags:
      - Tags
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TagRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TagRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
          description: ''
  /api/v1/tags/{id}/:
    get:
      operationId: tags_retrieve
      description: Retrieve details of a specific tag.
      summary: Get tag details
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this tag.
        required: true
      tags:
      - Tags
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
          description: ''
    put:
      operationId: tags_update
      description: Update all fields of a tag.
      summary: Update a tag
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this tag.
        required: true
      tags:
      - Tags
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TagRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TagRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
          description: ''
    patch:
      operationId: tags_partial_update
      description: Update specific fields of a tag.
      summary: Partially update a tag
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this tag.
        required: true
      tags:
      - Tags
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedTagRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedTagRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedTagRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
          description: ''
    delete:
      operationId: tags_destroy
      description: Delete a tag. The tag will be removed from all associated tasks.
      summary: Delete a tag
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this tag.
        required: true
      tags:
      - Tags
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/tasks/:
    get:
      operationId: tasks_list
      description: "\nGet all tasks for the authenticated user with filtering and
        sorting.\n\n**Filters:**\n- `status`: Filter by status (pending, in_progress,
        completed, cancelled)\n- `priority`: Filter by priority (low, medium, high,
        urgent)\n- `category`: Filter by category ID\n- `energy_level`: Filter by
        energy level (low, medium, high)\n- `due_date_before`: Tasks due before this
        date\n- `due_date_after`: Tasks due after this date\n- `is_overdue`: Filter
        overdue tasks (true/false)\n\n**Search:**\n- Search in title and description\n\n**Ordering:**\n-
        created_at, due_date, priority, status\n        "
      summary: List all tasks
      parameters:
      - in: query
        name: category
        schema:
          type: string
        description: Filter by category ID
      - in: query
        name: energy_level
        schema:
          type: string
          enum:
          - high
          - low
          - medium
        description: |-
          User energy level when creating task

          * `high` - High Energy
          * `medium` - Medium Energy
          * `low` - Low Energy
      - in: query
        name: is_overdue
        schema:
          type: boolean
        description: Filter overdue tasks
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: priority
        schema:
          type: string
        description: Filter by priority
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
        description: Filter by status
      tags:
      - Tasks
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTaskListList'
          description: ''
    post:
      operationId: tasks_create
      description: Create a new task with optional category and tags.
      summary: Create a task
      tags:
      - Tasks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreateUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TaskCreateUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TaskCreateUpdateRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreateUpdate'
          description: ''
  /api/v1/tasks/{id}/:
    get:
      operationId: tasks_retrieve
      description: Retrieve full details of a specific task.
      summary: Get task details
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this task.
        required: true
      tags:
      - Tasks
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDetail'
          description: ''
    put:
      operationId: tasks_update
      description: Update all fields of a task.
      summary: Update a task
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
